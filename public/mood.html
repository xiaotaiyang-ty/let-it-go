<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心情观察 · 不内耗</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 子页面布局 */
        .page-layout {
            min-height: 100vh;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px;
        }

        .page-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 32px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            background: white;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-full);
            color: var(--text-secondary);
            text-decoration: none;
            transition: all var(--transition-fast);
            box-shadow: var(--shadow-sm);
        }

        .back-btn:hover {
            border-color: var(--mint-300);
            color: var(--mint-500);
            box-shadow: var(--shadow-md);
        }

        .page-title-group {
            flex: 1;
        }

        .page-title {
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: 400;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .page-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* 概览卡片 */
        .mood-overview {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .overview-card {
            background: white;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow-sm);
        }

        .overview-icon {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .overview-value {
            font-family: var(--font-display);
            font-size: 2rem;
            color: var(--mint-500);
            margin-bottom: 4px;
        }

        .overview-label {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* 今日心情卡片 */
        .today-mood-card {
            background: linear-gradient(135deg, var(--mint-50) 0%, white 100%);
            border: 2px solid var(--mint-200);
            border-radius: var(--radius-xl);
            padding: 32px;
            margin-bottom: 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .today-mood-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, var(--mint-100) 0%, transparent 70%);
            opacity: 0.5;
        }

        .today-emoji {
            font-size: 4rem;
            margin-bottom: 16px;
            position: relative;
        }

        .today-score {
            font-family: var(--font-display);
            font-size: 3rem;
            color: var(--mint-500);
            margin-bottom: 8px;
            position: relative;
        }

        .today-score span {
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        .today-label {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 16px;
            position: relative;
        }

        .today-summary {
            font-size: 1rem;
            color: var(--text-primary);
            line-height: 1.8;
            max-width: 400px;
            margin: 0 auto 16px;
            position: relative;
        }

        .today-suggestion {
            font-size: 0.9rem;
            color: var(--mint-500);
            font-style: italic;
            position: relative;
        }

        .today-keywords {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
            position: relative;
        }

        .keyword-tag {
            font-size: 0.8rem;
            padding: 6px 14px;
            background: white;
            border: 1px solid var(--mint-200);
            border-radius: var(--radius-full);
            color: var(--mint-500);
        }

        /* 分析按钮 */
        .analyze-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            background: linear-gradient(135deg, var(--mint-400) 0%, var(--mint-500) 100%);
            color: white;
            border: none;
            border-radius: var(--radius-full);
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
            position: relative;
        }

        .analyze-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4);
        }

        .analyze-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .analyze-btn.loading {
            pointer-events: none;
        }

        .refresh-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border: 1px solid var(--mint-200);
            border-radius: var(--radius-full);
            color: var(--mint-500);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .refresh-btn:hover {
            background: var(--mint-50);
            transform: rotate(180deg);
        }

        .refresh-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 通用卡片 */
        .mood-card {
            background: white;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 心情记录列表 */
        .mood-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .mood-item {
            padding: 16px;
            background: linear-gradient(135deg, #fafafa 0%, white 100%);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            transition: all var(--transition-fast);
        }

        .mood-item:hover {
            border-color: var(--mint-200);
        }

        .mood-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .mood-date {
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mood-date-emoji {
            font-size: 1.2rem;
        }

        .mood-score-badge {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            background: var(--mint-50);
            border-radius: var(--radius-full);
            color: var(--mint-500);
            font-weight: 500;
            font-size: 0.85rem;
        }

        .mood-content {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.7;
        }

        .mood-item-keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }

        .mood-item-keywords .keyword-tag {
            font-size: 0.75rem;
            padding: 4px 10px;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 40px;
            background: white;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-sm);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .empty-text {
            font-family: var(--font-display);
            font-size: 1.3rem;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .empty-hint {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.8;
            margin-bottom: 24px;
        }

        /* 加载状态 */
        .loading-state {
            text-align: center;
            padding: 40px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--mint-100);
            border-top-color: var(--mint-500);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 提示信息 */
        .analyze-hint {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 12px;
        }

        /* 响应式 */
        @media (max-width: 700px) {
            .page-layout {
                padding: 20px;
            }
            .mood-overview {
                grid-template-columns: 1fr;
            }
            .today-mood-card {
                padding: 24px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-decoration">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="page-layout">
        <header class="page-header">
            <a href="index.html" class="back-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </a>
            <div class="page-title-group">
                <h1 class="page-title">心情观察</h1>
                <p class="page-subtitle">看见情绪，理解自己</p>
            </div>
        </header>

        <!-- 加载状态 -->
        <div class="loading-state" id="loadingState">
            <div class="loading-spinner"></div>
            <p style="color: var(--text-muted);">正在加载心情数据...</p>
        </div>

        <!-- 主内容（默认隐藏） -->
        <div id="mainContent" style="display: none;">
            <!-- 概览卡片 -->
            <div class="mood-overview">
                <div class="overview-card">
                    <div class="overview-icon">💚</div>
                    <div class="overview-value" id="avgScore">--</div>
                    <div class="overview-label">本周心情</div>
                </div>
                <div class="overview-card">
                    <div class="overview-icon">💬</div>
                    <div class="overview-value" id="chatCount">0</div>
                    <div class="overview-label">本周聊天</div>
                </div>
                <div class="overview-card">
                    <div class="overview-icon">📅</div>
                    <div class="overview-value" id="daysCount">0</div>
                    <div class="overview-label">记录天数</div>
                </div>
            </div>

            <!-- 今日心情 -->
            <div class="today-mood-card" id="todayMoodCard">
                <button class="refresh-btn" id="refreshBtn" title="重新分析">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6M1 20v-6h6"/>
                        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                    </svg>
                </button>

                <!-- 未分析状态 -->
                <div id="notAnalyzed">
                    <div class="today-emoji">🤔</div>
                    <p class="today-label">今天还没有分析心情</p>
                    <p class="today-summary">点击下方按钮，让我帮你回顾今天的心情</p>
                    <button class="analyze-btn" id="analyzeBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
                            <polyline points="22 4 12 14.01 9 11.01"/>
                        </svg>
                        分析今日心情
                    </button>
                    <p class="analyze-hint">消耗 1 次 API 额度</p>
                </div>

                <!-- 已分析状态 -->
                <div id="analyzed" style="display: none;">
                    <div class="today-emoji" id="todayEmoji">😊</div>
                    <div class="today-score"><span id="todayScore">75</span><span>分</span></div>
                    <p class="today-label" id="todayLabel">平静</p>
                    <p class="today-summary" id="todaySummary">今天的你看起来还不错</p>
                    <p class="today-suggestion" id="todaySuggestion">💚 继续保持好心情</p>
                    <div class="today-keywords" id="todayKeywords"></div>
                </div>
            </div>

            <!-- 历史记录 -->
            <div class="mood-card" id="historyCard" style="display: none;">
                <div class="card-header">
                    <h3 class="card-title">📝 历史心情</h3>
                </div>
                <div class="mood-list" id="moodList"></div>
            </div>
        </div>

        <!-- 空状态 -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-icon">💭</div>
            <p class="empty-text">开始记录你的心情吧</p>
            <p class="empty-hint">和我聊聊天，然后回来看看心情分析</p>
            <a href="index.html" class="analyze-btn" style="text-decoration: none;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                </svg>
                开始聊天
            </a>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script>
        // 检查登录
        if (!localStorage.getItem(CONFIG.TOKEN_KEY)) {
            window.location.href = 'index.html';
        }

        const loadingState = document.getElementById('loadingState');
        const mainContent = document.getElementById('mainContent');
        const emptyState = document.getElementById('emptyState');
        const notAnalyzed = document.getElementById('notAnalyzed');
        const analyzed = document.getElementById('analyzed');
        const historyCard = document.getElementById('historyCard');
        const moodList = document.getElementById('moodList');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const refreshBtn = document.getElementById('refreshBtn');

        // 页面加载
        document.addEventListener('DOMContentLoaded', loadMoodData);

        // 分析按钮
        analyzeBtn.addEventListener('click', () => analyzeMood(false));
        refreshBtn.addEventListener('click', () => analyzeMood(true));

        // 加载心情数据
        async function loadMoodData() {
            try {
                const data = await API.get('/api/mood/history');

                loadingState.style.display = 'none';
                mainContent.style.display = 'block';

                // 更新统计
                document.getElementById('avgScore').textContent = data.stats.week_avg_score || '--';
                document.getElementById('chatCount').textContent = data.stats.week_chat_count || 0;
                document.getElementById('daysCount').textContent = data.stats.week_record_days || 0;

                // 今日心情
                if (data.today) {
                    showAnalyzedMood(data.today);
                } else {
                    notAnalyzed.style.display = 'block';
                    analyzed.style.display = 'none';
                }

                // 历史记录（排除今天）
                const history = data.history.filter(h => {
                    const recordDate = new Date(h.date);
                    const today = new Date();
                    return recordDate.toDateString() !== today.toDateString();
                });

                if (history.length > 0) {
                    historyCard.style.display = 'block';
                    renderHistory(history);
                }

            } catch (error) {
                console.error('加载失败:', error);
                loadingState.style.display = 'none';

                if (error.message.includes('登录')) {
                    window.location.href = 'index.html';
                } else {
                    emptyState.style.display = 'block';
                }
            }
        }

        // 分析心情
        async function analyzeMood(forceRefresh) {
            const btn = forceRefresh ? refreshBtn : analyzeBtn;
            const originalContent = btn.innerHTML;

            btn.disabled = true;
            btn.innerHTML = forceRefresh
                ? '<div class="loading-spinner" style="width:18px;height:18px;margin:0;"></div>'
                : '<div class="loading-spinner" style="width:18px;height:18px;margin:0;"></div> 分析中...';

            try {
                const data = await API.post('/api/mood/analyze', {
                    force_refresh: forceRefresh
                });

                if (data.mood) {
                    showAnalyzedMood(data.mood);

                    // 如果是刷新，重新加载页面数据
                    if (forceRefresh) {
                        loadMoodData();
                    }
                }

            } catch (error) {
                alert(error.message || '分析失败，请稍后重试');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalContent;
            }
        }

        // 显示已分析的心情
        function showAnalyzedMood(mood) {
            notAnalyzed.style.display = 'none';
            analyzed.style.display = 'block';

            document.getElementById('todayEmoji').textContent = mood.emoji || '😊';
            document.getElementById('todayScore').textContent = mood.score || 65;
            document.getElementById('todayLabel').textContent = mood.mood_label || '平静';
            document.getElementById('todaySummary').textContent = mood.summary || '今天的你看起来还不错';
            document.getElementById('todaySuggestion').textContent = '💚 ' + (mood.suggestion || '继续保持好心情');

            // 关键词
            const keywordsEl = document.getElementById('todayKeywords');
            keywordsEl.innerHTML = '';
            if (mood.keywords && mood.keywords.length > 0) {
                mood.keywords.forEach(k => {
                    const tag = document.createElement('span');
                    tag.className = 'keyword-tag';
                    tag.textContent = k;
                    keywordsEl.appendChild(tag);
                });
            }
        }

        // 渲染历史记录
        function renderHistory(history) {
            moodList.innerHTML = '';

            history.forEach(record => {
                const date = new Date(record.date);
                const dateStr = formatDate(date);

                const item = document.createElement('div');
                item.className = 'mood-item';
                item.innerHTML = `
                    <div class="mood-item-header">
                        <span class="mood-date">
                            <span class="mood-date-emoji">${record.emoji || '😊'}</span>
                            ${dateStr}
                        </span>
                        <span class="mood-score-badge">${record.score || 65}分 · ${record.mood_label || '平静'}</span>
                    </div>
                    <div class="mood-content">${escapeHtml(record.summary || '')}</div>
                    ${record.keywords && record.keywords.length > 0 ? `
                        <div class="mood-item-keywords">
                            ${record.keywords.map(k => `<span class="keyword-tag">${escapeHtml(k)}</span>`).join('')}
                        </div>
                    ` : ''}
                `;
                moodList.appendChild(item);
            });
        }

        function formatDate(date) {
            const now = new Date();
            const diff = now - date;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));

            if (days === 0) return '今天';
            if (days === 1) return '昨天';
            if (days === 2) return '前天';
            if (days < 7) return `${days}天前`;

            return date.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
