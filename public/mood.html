<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心情观察 · 不内耗</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 子页面布局 */
        .page-layout {
            min-height: 100vh;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px;
        }

        .page-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 32px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            background: white;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-full);
            color: var(--text-secondary);
            text-decoration: none;
            transition: all var(--transition-fast);
            box-shadow: var(--shadow-sm);
        }

        .back-btn:hover {
            border-color: var(--mint-300);
            color: var(--mint-500);
            box-shadow: var(--shadow-md);
        }

        .page-title-group {
            flex: 1;
        }

        .page-title {
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: 400;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .page-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* 概览卡片 */
        .mood-overview {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .overview-card {
            background: white;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow-sm);
        }

        .overview-icon {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .overview-value {
            font-family: var(--font-display);
            font-size: 2rem;
            color: var(--mint-500);
            margin-bottom: 4px;
        }

        .overview-label {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* 通用卡片 */
        .mood-card {
            background: white;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 心情记录列表 */
        .mood-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .mood-item {
            padding: 16px;
            background: linear-gradient(135deg, #fafafa 0%, white 100%);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
        }

        .mood-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .mood-date {
            font-weight: 600;
            color: var(--text-primary);
        }

        .mood-score {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--mint-500);
            font-weight: 500;
        }

        .mood-content {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.7;
        }

        .mood-keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }

        .keyword-tag {
            font-size: 0.75rem;
            padding: 4px 10px;
            background: var(--mint-50);
            border-radius: var(--radius-full);
            color: var(--mint-500);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 40px;
            background: white;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-sm);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .empty-text {
            font-family: var(--font-display);
            font-size: 1.3rem;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .empty-hint {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.8;
            margin-bottom: 24px;
        }

        .empty-action {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            background: linear-gradient(135deg, var(--mint-400) 0%, var(--mint-500) 100%);
            color: white;
            text-decoration: none;
            border-radius: var(--radius-full);
            font-weight: 500;
            transition: all var(--transition-fast);
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
        }

        .empty-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4);
        }

        /* 响应式 */
        @media (max-width: 700px) {
            .page-layout {
                padding: 20px;
            }
            .mood-overview {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="bg-decoration">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="page-layout">
        <header class="page-header">
            <a href="index.html" class="back-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </a>
            <div class="page-title-group">
                <h1 class="page-title">心情观察</h1>
                <p class="page-subtitle">看见情绪，理解自己</p>
            </div>
        </header>

        <!-- 概览卡片 -->
        <div class="mood-overview" id="moodOverview">
            <div class="overview-card">
                <div class="overview-icon">💚</div>
                <div class="overview-value" id="avgScore">--</div>
                <div class="overview-label">本周心情</div>
            </div>
            <div class="overview-card">
                <div class="overview-icon">💬</div>
                <div class="overview-value" id="chatCount">0</div>
                <div class="overview-label">聊天次数</div>
            </div>
            <div class="overview-card">
                <div class="overview-icon">📅</div>
                <div class="overview-value" id="daysCount">0</div>
                <div class="overview-label">记录天数</div>
            </div>
        </div>

        <!-- 心情记录 -->
        <div class="mood-card" id="moodCard">
            <div class="card-header">
                <h3 class="card-title">📝 最近心情</h3>
            </div>
            <div class="mood-list" id="moodList">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 空状态 -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-icon">💭</div>
            <p class="empty-text">还没有心情记录</p>
            <p class="empty-hint">和我聊聊天，<br>我会帮你记录每天的心情变化</p>
            <a href="index.html" class="empty-action">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                </svg>
                开始聊天
            </a>
        </div>
    </main>

    <script src="js/storage.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const moodCard = document.getElementById('moodCard');
            const moodList = document.getElementById('moodList');
            const emptyState = document.getElementById('emptyState');

            // 从本地存储获取对话数据
            const conversations = JSON.parse(localStorage.getItem('conversations') || '[]');

            if (conversations.length === 0) {
                moodCard.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            // 统计数据
            const now = new Date();
            const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);

            // 本周对话
            const weekConvs = conversations.filter(c => new Date(c.createdAt) >= weekAgo);

            // 更新统计
            document.getElementById('chatCount').textContent = weekConvs.length;

            // 计算天数
            const uniqueDays = new Set(weekConvs.map(c => {
                const d = new Date(c.createdAt);
                return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
            }));
            document.getElementById('daysCount').textContent = uniqueDays.size;

            // 简单的心情分析（基于对话内容关键词）
            let totalScore = 0;
            let scoreCount = 0;

            const positiveWords = ['开心', '高兴', '感谢', '好的', '不错', '明白', '理解', '谢谢', '嗯'];
            const negativeWords = ['难过', '焦虑', '担心', '害怕', '生气', '烦', '累', '痛苦', '失望'];

            // 渲染心情列表
            const recentConvs = conversations.slice(0, 10);

            recentConvs.forEach(conv => {
                const userMessages = conv.messages?.filter(m => m.role === 'user') || [];
                const allText = userMessages.map(m => m.content).join(' ');

                // 简单情感分析
                let score = 70; // 默认中性
                positiveWords.forEach(w => { if (allText.includes(w)) score += 5; });
                negativeWords.forEach(w => { if (allText.includes(w)) score -= 5; });
                score = Math.max(30, Math.min(100, score));

                totalScore += score;
                scoreCount++;

                // 提取关键词
                const keywords = [];
                if (allText.includes('工作') || allText.includes('老板') || allText.includes('同事')) keywords.push('工作');
                if (allText.includes('家人') || allText.includes('父母') || allText.includes('妈') || allText.includes('爸')) keywords.push('家庭');
                if (allText.includes('朋友')) keywords.push('朋友');
                if (allText.includes('恋') || allText.includes('对象') || allText.includes('男朋友') || allText.includes('女朋友')) keywords.push('感情');
                if (allText.includes('压力') || allText.includes('焦虑')) keywords.push('压力');

                const date = new Date(conv.createdAt || conv.updatedAt);
                const dateStr = formatDate(date);
                const preview = userMessages[0]?.content?.slice(0, 50) || '(无内容)';

                const item = document.createElement('div');
                item.className = 'mood-item';
                item.innerHTML = `
                    <div class="mood-item-header">
                        <span class="mood-date">${dateStr}</span>
                        <span class="mood-score">${getMoodEmoji(score)} ${score}分</span>
                    </div>
                    <div class="mood-content">${escapeHtml(preview)}${preview.length >= 50 ? '...' : ''}</div>
                    ${keywords.length > 0 ? `
                        <div class="mood-keywords">
                            ${keywords.map(k => `<span class="keyword-tag">${k}</span>`).join('')}
                        </div>
                    ` : ''}
                `;
                moodList.appendChild(item);
            });

            // 更新平均分
            if (scoreCount > 0) {
                const avg = Math.round(totalScore / scoreCount);
                document.getElementById('avgScore').textContent = avg;
            }

            function getMoodEmoji(score) {
                if (score >= 80) return '😊';
                if (score >= 60) return '🙂';
                if (score >= 40) return '😐';
                return '😔';
            }

            function formatDate(date) {
                const now = new Date();
                const diff = now - date;
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));

                if (days === 0) return '今天';
                if (days === 1) return '昨天';
                if (days < 7) return `${days}天前`;

                return date.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' });
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        });
    </script>
</body>
</html>
