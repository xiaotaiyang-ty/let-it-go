<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史对话 - 不内耗</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .history-list {
            padding: 32px 48px;
        }
        .history-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px;
            background: var(--cream-100);
            border-radius: var(--radius-md);
            margin-bottom: 12px;
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .history-item:hover {
            background: var(--mint-50);
            transform: translateX(4px);
        }
        .history-icon {
            font-size: 1.5rem;
        }
        .history-info {
            flex: 1;
        }
        .history-title {
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .history-preview {
            font-size: 0.85rem;
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .history-time {
            font-size: 0.8rem;
            color: var(--text-light);
        }
        .history-delete {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            border-radius: var(--radius-full);
            color: var(--text-muted);
            cursor: pointer;
            opacity: 0;
            transition: all var(--transition-fast);
        }
        .history-item:hover .history-delete {
            opacity: 1;
        }
        .history-delete:hover {
            background: #fef2f2;
            color: #ef4444;
        }
        .empty-state {
            text-align: center;
            padding: 80px 40px;
            color: var(--text-muted);
        }
        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="bg-decoration">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">不内耗</h1>
                <p class="tagline">换个角度看问题</p>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                    </svg>
                    <span>聊天</span>
                </a>
                <a href="history.html" class="nav-item active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <span>历史</span>
                </a>
                <a href="saved.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/>
                    </svg>
                    <span>收藏</span>
                </a>
                <a href="settings.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                    <span>设置</span>
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="history-list" id="historyList">
                <div class="empty-state" id="emptyState">
                    <div class="empty-state-icon">📝</div>
                    <p>还没有对话记录</p>
                    <p style="margin-top: 8px;"><a href="index.html" style="color: var(--mint-500);">开始第一次对话</a></p>
                </div>
            </div>
        </main>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script>
        // 检查登录
        if (!localStorage.getItem(CONFIG.TOKEN_KEY)) {
            window.location.href = 'index.html';
        }

        // 加载历史
        async function loadHistory() {
            try {
                const data = await API.get('/api/conversations');
                const list = document.getElementById('historyList');

                if (!data.conversations || data.conversations.length === 0) {
                    return;
                }

                document.getElementById('emptyState').style.display = 'none';

                data.conversations.forEach(conv => {
                    const item = document.createElement('div');
                    item.className = 'history-item';
                    item.innerHTML = `
                        <span class="history-icon">💬</span>
                        <div class="history-info">
                            <div class="history-title">${escapeHtml(conv.title)}</div>
                            <div class="history-preview">${escapeHtml(conv.last_message || '')}</div>
                        </div>
                        <span class="history-time">${formatDate(conv.updated_at)}</span>
                        <button class="history-delete" onclick="deleteConversation('${conv.id}', event)" title="删除">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                            </svg>
                        </button>
                    `;
                    item.onclick = () => viewConversation(conv.id);
                    list.appendChild(item);
                });
            } catch (error) {
                console.error('加载历史失败:', error);
            }
        }

        function viewConversation(id) {
            // TODO: 查看对话详情
            alert('查看对话功能开发中...');
        }

        async function deleteConversation(id, event) {
            event.stopPropagation();
            if (!confirm('确定要删除这个对话吗？')) return;

            try {
                await API.delete(`/api/conversations/${id}`);
                event.target.closest('.history-item').remove();
            } catch (error) {
                alert('删除失败: ' + error.message);
            }
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;

            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
            if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
            if (diff < 604800000) return Math.floor(diff / 86400000) + '天前';

            return date.toLocaleDateString('zh-CN');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadHistory();
    </script>
</body>
</html>
